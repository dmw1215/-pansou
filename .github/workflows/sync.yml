name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天国际标准时间0点（北京时间早上8点）执行一次
  workflow_dispatch: # 允许你手动点击按钮触发

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }} # 只有是 Fork 的仓库才执行

    steps:
      # 1. 标准 checkout
      - name: Checkout target repo
        uses: actions/checkout@v3

      # 2. 同步上游变更
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: fish2018/pansou # 【重要】这里一定要改成原作者的仓库名！
          upstream_sync_branch: main    # 原作者的主分支名（通常是 main 或 master）
          target_sync_branch: main      # 你仓库的主分支名
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # 自动生成的 token，不需要手动设置
          test_mode: false

      # 3. 如果有更新，打印日志
      - name: New commits found
        if: steps.sync.outputs.has_new_commits == 'true'
        run: echo "New commits were found to sync."
    
      - name: No new commits
        if: steps.sync.outputs.has_new_commits == 'false'
        run: echo "There were no new commits."
        
      - name: Show value of 'has_new_commits'
        run: echo ${{ steps.sync.outputs.has_new_commits }}
